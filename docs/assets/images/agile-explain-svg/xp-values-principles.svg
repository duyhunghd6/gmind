<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 800" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap');
      .title { fill: #f8fafc; font-size: 26px; font-family: 'DM Sans', system-ui, sans-serif; font-weight: 500; letter-spacing: 1px; }
      .box-txt { fill: #f8fafc; font-size: 16px; font-family: 'DM Sans', system-ui, sans-serif; font-weight: 400; }
      /* Theme Adaptation */
      rect[fill="url(#bg)"] { fill: transparent !important; }
      @media (prefers-color-scheme: light) {
        rect[fill="#1e293b" i], rect[fill="#0f172a" i], rect[fill="#131c2f" i], 
        rect[fill="rgba(30, 41, 59, 1)" i], rect[fill="rgba(15, 23, 42, 1)" i],
        .box, .node-rect, .card { 
          fill: #ffffff !important; 
          stroke: #cbd5e1 !important; 
        }
        rect[fill="url(#cardBg)" i], rect[fill="url(#cardBg1)" i], rect[fill="url(#surface)" i], rect[fill="url(#glass)" i] {
          fill: #ffffff !important; 
          stroke: #e2e8f0 !important; 
        }
        
        /* Dark text (previously white/light) */
        text[fill="#ffffff" i], text[fill="#fff" i], text[fill="white" i], 
        text[fill="#f8fafc" i], text[fill="#f1f5f9" i],
        tspan[fill="#ffffff" i], tspan[fill="#fff" i], tspan[fill="white" i], 
        tspan[fill="#f8fafc" i], tspan[fill="#f1f5f9" i],
        g[fill="#ffffff" i] text, g[fill="#fff" i] text, g[fill="white" i] text,
        g[fill="#f8fafc" i] text, g[fill="#f1f5f9" i] text,
        .white-txt, .white-text, .text-white, .text-light,
        .box-txt, .node-txt, .hdr, .title, .phase-text, .lead, .lbl-bold, .title-text, .step-text-large, .num, .section-title, .header-txt, .group-txt, .prac-txt, .bold-txt, text.bold, text.large, text.txt {
          fill: #0f172a !important;
        }

        /* Gray text (previously light gray) */
        text[fill="#cbd5e1" i], text[fill="#94a3b8" i], text[fill="#e2e8f0" i],
        tspan[fill="#cbd5e1" i], tspan[fill="#94a3b8" i],
        .mono-txt, .desc-text, .sub, .sm-txt, .lbl-sm, .text-gray, text.small, text.medium, .step-text-small, .list-txt, .desc, .lbl-txt, .col-txt, .row-txt {
          fill: #475569 !important;
        }

        /* Specific foreignObject HTML content */
        .body { color: #475569 !important; }
        
        /* Vibrant color mappings for light mode contrast */
        text[fill="#2dd4bf" i], .brace-txt { fill: #0d9488 !important; }
        text[fill="#38bdf8" i], .label-text, text[fill="#0ea5e9" i] { fill: #0284c7 !important; }
        text[fill="#fb7185" i], text[fill="#ec4899" i] { fill: #e11d48 !important; }
        text[fill="#fcd34d" i], text[fill="#f59e0b" i] { fill: #d97706 !important; }
        text[fill="#6ee7b7" i], text[fill="#10b981" i] { fill: #059669 !important; }
        text[fill="#93c5fd" i] { fill: #2563eb !important; }
        text[fill="#a855f7" i] { fill: #9333ea !important; }
        
        /* Paths and lines */
        path[stroke="#64748b" i], line[stroke="#64748b" i], path[stroke="#475569" i], line[stroke="#475569" i], path[stroke="#cbd5e1" i], line[stroke="#cbd5e1" i], path[stroke="#ffffff" i], path[stroke="#fff" i] {
          stroke: #94a3b8 !important;
        }
        line[stroke="rgba(255,255,255,0.1)"], line[stroke="rgba(255,255,255,0.2)"], line[stroke="#ffffff" i], line[stroke="#fff" i] {
          stroke: rgba(0,0,0,0.1) !important;
        }
        circle[fill="#ffffff" i], circle[fill="#fff" i] {
          fill: #0f172a !important;
        }
      }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1121" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000" flood-opacity="0.6" />
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <marker id="arrow-val" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#0ea5e9" />
    </marker>
    <marker id="arrow-prin" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#14b8a6" />
    </marker>
      <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(30, 41, 59, 1)" />
      <stop offset="100%" stop-color="rgba(15, 23, 42, 1)" />
    </linearGradient>
  </defs>
  
  <rect width="100%" height="100%" fill="url(#bg)" rx="16" />
  
  <text x="450" y="50.2" dominant-baseline="middle" text-anchor="middle" class="title">GIÁ TRỊ VÀ CÁC NGUYÊN TẮC</text>
  <text x="450" y="85.2" dominant-baseline="middle" text-anchor="middle" class="title">CỦA EXTREME PROGRAMMING</text>

  <!-- VALUES Group -->
  <g text-anchor="middle">
    <!-- Connections for Values -->
    <g fill="none" stroke="#0ea5e9" stroke-width="1" marker-end="url(#arrow-val)" filter="url(#glow)">
      <line x1="450" y1="200" x2="450" y2="230" marker-end="none" />
      <line x1="170" y1="230" x2="730" y2="230" marker-end="none" />
      <line x1="170" y1="230" x2="170" y2="260" />
      <line x1="450" y1="230" x2="450" y2="260" />
      <line x1="730" y1="230" x2="730" y2="260" />
      <line x1="310" y1="230" x2="310" y2="340" />
      <line x1="590" y1="230" x2="590" y2="340" />
    </g>

    <!-- Main Values node -->
    <rect x="360" y="150" width="180" height="50" rx="6" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="450" y="174.7" dominant-baseline="middle" class="box-txt" fill="#7dd3fc" font-size="18px">Giá trị (Values)</text>
    
    <!-- Row 1 Values -->
    <rect x="80" y="270" width="180" height="50" rx="8" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="170" y="295.4" dominant-baseline="middle" class="box-txt">Giao tiếp</text>
    
    <rect x="360" y="270" width="180" height="50" rx="8" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="450" y="295.4" dominant-baseline="middle" class="box-txt">Đơn giản</text>
    
    <rect x="640" y="270" width="180" height="50" rx="8" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="730" y="295.4" dominant-baseline="middle" class="box-txt">Phản hồi</text>

    <!-- Row 2 Values -->
    <rect x="220" y="350" width="180" height="50" rx="8" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="310" y="375.4" dominant-baseline="middle" class="box-txt">Tôn trọng</text>
    
    <rect x="500" y="350" width="180" height="50" rx="8" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="590" y="375.4" dominant-baseline="middle" class="box-txt">Dũng cảm</text>
  </g>

  <!-- PRINCIPLES Group -->
  <g text-anchor="middle">
    <!-- Connections for Principles -->
    <g fill="none" stroke="#14b8a6" stroke-width="1" marker-end="url(#arrow-prin)" filter="url(#glow)">
      <!-- Connecting Values to Principles main node -->
      <line x1="450" y1="400" x2="450" y2="440" stroke="#475569" marker-end="none" stroke-dasharray="6,4" /> 
      
      <line x1="450" y1="500" x2="450" y2="530" marker-end="none" />
      <line x1="170" y1="530" x2="730" y2="530" marker-end="none" />
      <line x1="170" y1="530" x2="170" y2="560" />
      <line x1="450" y1="530" x2="450" y2="560" />
      <line x1="730" y1="530" x2="730" y2="560" />
      <line x1="310" y1="530" x2="310" y2="640" />
      <line x1="590" y1="530" x2="590" y2="640" />
    </g>

    <!-- Main Principles node -->
    <rect x="360" y="450" width="180" height="50" rx="6" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="450" y="474.7" dominant-baseline="middle" class="box-txt" fill="#5eead4" font-size="18px">Nguyên tắc</text>
    
    <!-- Row 1 Principles -->
    <rect x="80" y="570" width="180" height="50" rx="8" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="170" y="595.4" dominant-baseline="middle" class="box-txt">Thay đổi tăng dần</text>
    
    <rect x="360" y="570" width="180" height="50" rx="8" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="450" y="595.4" dominant-baseline="middle" class="box-txt">Giả định Đơn giản hóa</text>
    
    <rect x="640" y="570" width="180" height="50" rx="8" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="730" y="595.4" dominant-baseline="middle" class="box-txt">Phản hồi nhanh</text>

    <!-- Row 2 Principles -->
    <rect x="220" y="650" width="180" height="50" rx="8" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="310" y="675.4" dominant-baseline="middle" class="box-txt">Chào đón thay đổi</text>
    
    <rect x="500" y="650" width="180" height="50" rx="8" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
    <text x="590" y="675.4" dominant-baseline="middle" class="box-txt">Công việc chất lượng</text>
  </g>

</svg>
