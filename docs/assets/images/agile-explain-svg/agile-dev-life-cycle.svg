<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 550" width="800" height="550">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap');
      .hdr { font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; font-weight: 400; fill: #f8fafc; letter-spacing: 1px; }
      .lbl-sm { font-family: 'DM Sans', system-ui, sans-serif; font-size: 11px; font-weight: 400; fill: #e2e8f0; text-anchor: middle; }
      .lbl-bold { font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px; font-weight: 400; fill: #f8fafc; text-anchor: middle; }
      /* Theme Adaptation */
      rect[fill="url(#bg)"] { fill: transparent !important; }
      @media (prefers-color-scheme: light) {
        rect[fill="#1e293b" i], rect[fill="#0f172a" i], rect[fill="#131c2f" i], 
        rect[fill="rgba(30, 41, 59, 1)" i], rect[fill="rgba(15, 23, 42, 1)" i],
        .box, .node-rect, .card { 
          fill: #ffffff !important; 
          stroke: #cbd5e1 !important; 
        }
        rect[fill="url(#cardBg)" i], rect[fill="url(#cardBg1)" i], rect[fill="url(#surface)" i], rect[fill="url(#glass)" i] {
          fill: #ffffff !important; 
          stroke: #e2e8f0 !important; 
        }
        
        /* Dark text (previously white/light) */
        text[fill="#ffffff" i], text[fill="#fff" i], text[fill="white" i], 
        text[fill="#f8fafc" i], text[fill="#f1f5f9" i],
        tspan[fill="#ffffff" i], tspan[fill="#fff" i], tspan[fill="white" i], 
        tspan[fill="#f8fafc" i], tspan[fill="#f1f5f9" i],
        g[fill="#ffffff" i] text, g[fill="#fff" i] text, g[fill="white" i] text,
        g[fill="#f8fafc" i] text, g[fill="#f1f5f9" i] text,
        .white-txt, .white-text, .text-white, .text-light,
        .box-txt, .node-txt, .hdr, .title, .phase-text, .lead, .lbl-bold, .title-text, .step-text-large, .num, .section-title, .header-txt, .group-txt, .prac-txt, .bold-txt, text.bold, text.large, text.txt {
          fill: #0f172a !important;
        }

        /* Gray text (previously light gray) */
        text[fill="#cbd5e1" i], text[fill="#94a3b8" i], text[fill="#e2e8f0" i],
        tspan[fill="#cbd5e1" i], tspan[fill="#94a3b8" i],
        .mono-txt, .desc-text, .sub, .sm-txt, .lbl-sm, .text-gray, text.small, text.medium, .step-text-small, .list-txt, .desc, .lbl-txt, .col-txt, .row-txt {
          fill: #475569 !important;
        }

        /* Specific foreignObject HTML content */
        .body { color: #475569 !important; }
        
        /* Vibrant color mappings for light mode contrast */
        text[fill="#2dd4bf" i], .brace-txt { fill: #0d9488 !important; }
        text[fill="#38bdf8" i], .label-text, text[fill="#0ea5e9" i] { fill: #0284c7 !important; }
        text[fill="#fb7185" i], text[fill="#ec4899" i] { fill: #e11d48 !important; }
        text[fill="#fcd34d" i], text[fill="#f59e0b" i] { fill: #d97706 !important; }
        text[fill="#6ee7b7" i], text[fill="#10b981" i] { fill: #059669 !important; }
        text[fill="#93c5fd" i] { fill: #2563eb !important; }
        text[fill="#a855f7" i] { fill: #9333ea !important; }
        
        /* Paths and lines */
        path[stroke="#64748b" i], line[stroke="#64748b" i], path[stroke="#475569" i], line[stroke="#475569" i], path[stroke="#cbd5e1" i], line[stroke="#cbd5e1" i], path[stroke="#ffffff" i], path[stroke="#fff" i] {
          stroke: #94a3b8 !important;
        }
        line[stroke="rgba(255,255,255,0.1)"], line[stroke="rgba(255,255,255,0.2)"], line[stroke="#ffffff" i], line[stroke="#fff" i] {
          stroke: rgba(0,0,0,0.1) !important;
        }
        circle[fill="#ffffff" i], circle[fill="#fff" i] {
          fill: #0f172a !important;
        }
      }
      @keyframes flow-dash { to { stroke-dashoffset: -20; } }
      .workflow-dashed { animation: flow-dash 1s linear infinite; }
      @keyframes pulseFlow {
        0%, 100% { transform: translateY(0); filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6)); }
        50% { transform: translateY(5px); filter: drop-shadow(0 8px 12px rgba(20, 184, 166, 0.6)); }
      }
      .workflow-arrow-block { animation: pulseFlow 2s ease-in-out infinite; transform-origin: center; }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1121" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.6" />
    </filter>
    <linearGradient id="primary" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#1e3a8a" />
    </linearGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="tealGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="100%" stop-color="#0d9488" />
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(30, 41, 59, 0.8)" />
      <stop offset="100%" stop-color="rgba(15, 23, 42, 0.8)" />
    </linearGradient>
      <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(30, 41, 59, 1)" />
      <stop offset="100%" stop-color="rgba(15, 23, 42, 1)" />
    </linearGradient>
  </defs>

  <rect width="800" height="550" fill="url(#bg)" rx="16" />

  <!-- ========= TRADITIONAL WATERFALL ========= -->
  <rect x="20" y="20" width="760" height="40" rx="8" fill="url(#primary)" filter="url(#shadow)" />
  <text x="400" y="39" dominant-baseline="middle" class="hdr" text-anchor="middle">MÔ HÌNH THÁC NƯỚC TRUYỀN THỐNG</text>

  <!-- Blocks -->
  <g transform="translate(20, 70)">
    <rect x="0" y="0" width="95" height="50" rx="6" fill="url(#surface)" stroke="#334155" filter="url(#shadow)" />
    <rect x="105" y="0" width="95" height="50" rx="6" fill="url(#surface)" stroke="#334155" filter="url(#shadow)" />
    <rect x="210" y="0" width="95" height="50" rx="6" fill="url(#surface)" stroke="#334155" filter="url(#shadow)" />
    <rect x="315" y="0" width="130" height="50" rx="6" fill="url(#surface)" stroke="#334155" filter="url(#shadow)" />
    <rect x="455" y="0" width="95" height="50" rx="6" fill="url(#surface)" stroke="#334155" filter="url(#shadow)" />
    <rect x="560" y="0" width="95" height="50" rx="6" fill="url(#surface)" stroke="#334155" filter="url(#shadow)" />
    <rect x="665" y="0" width="95" height="50" rx="6" fill="url(#surface)" stroke="#334155" filter="url(#shadow)" />
    <text x="47.5" y="25" dominant-baseline="middle" class="lbl-sm"><tspan x="47.5" dy="-6">Thu thập</tspan><tspan x="47.5" dy="14">Yêu cầu</tspan></text>
    <text x="152.5" y="25" dominant-baseline="middle" class="lbl-sm"><tspan x="152.5" dy="-6">Thiết kế</tspan><tspan x="152.5" dy="14">Nghiệp vụ</tspan></text>
    <text x="257.5" y="25" dominant-baseline="middle" class="lbl-sm"><tspan x="257.5" dy="-6">Thiết kế</tspan><tspan x="257.5" dy="14">Kỹ thuật</tspan></text>
    <text x="380" y="25" dominant-baseline="middle" class="lbl-sm"><tspan x="380" dy="-6">Phát triển</tspan><tspan x="380" dy="14">Hệ thống</tspan></text>
    <text x="502.5" y="25" dominant-baseline="middle" class="lbl-sm"><tspan x="502.5" dy="-6">Kiểm thử</tspan><tspan x="502.5" dy="14">Đơn vị</tspan></text>
    <text x="607.5" y="25" dominant-baseline="middle" class="lbl-sm"><tspan x="607.5" dy="-6">Kiểm thử</tspan><tspan x="607.5" dy="14">Tích hợp</tspan></text>
    <text x="712.5" y="25" dominant-baseline="middle" class="lbl-sm"><tspan x="712.5" dy="-6">Kiểm thử</tspan><tspan x="712.5" dy="14">Nghiệm thu</tspan></text>
  </g>

  <text x="730" y="137" dominant-baseline="middle" class="lbl-sm" fill="#94a3b8" text-anchor="end">HOÀN THÀNH RELEASE</text>

  <!-- Arrow down -->
  <polygon points="380,140 420,140 420,170 435,170 400,200 365,170 380,170" fill="url(#tealGrad)" filter="url(#shadow)" class="workflow-arrow-block" />

  <!-- ========= AGILE METHODOLOGY ========= -->
  <rect x="20" y="210" width="760" height="40" rx="8" fill="url(#tealGrad)" filter="url(#shadow)" />
  <text x="400" y="230" dominant-baseline="middle" class="hdr" text-anchor="middle">PHƯƠNG PHÁP AGILE</text>

  <g transform="translate(20, 260)">
    <rect x="0" y="0" width="130" height="100" rx="8" fill="url(#glass)" stroke="#0d9488" filter="url(#shadow)" />
    <text x="65" y="50" dominant-baseline="middle" class="lbl-bold" fill="#2dd4bf"><tspan x="65" dy="-16">Lập kế hoạch</tspan><tspan x="65" dy="16">ban đầu</tspan><tspan x="65" dy="16">hạn chế</tspan></text>

    <!-- 4 Releases -->
    <rect x="145" y="0" width="145" height="55" rx="6" fill="url(#surface)" stroke="#334155" />
    <text x="217.5" y="27.5" dominant-baseline="middle" class="lbl-bold">Release #1</text>
    
    <rect x="300" y="0" width="145" height="55" rx="6" fill="url(#surface)" stroke="#334155" />
    <text x="372.5" y="27.5" dominant-baseline="middle" class="lbl-bold">Release #2</text>
    
    <rect x="455" y="0" width="145" height="55" rx="6" fill="url(#surface)" stroke="#334155" />
    <text x="527.5" y="27.5" dominant-baseline="middle" class="lbl-bold">Release #3</text>
    
    <rect x="610" y="0" width="145" height="55" rx="6" fill="url(#surface)" stroke="#334155" />
    <text x="682.5" y="27.5" dominant-baseline="middle" class="lbl-bold">Release #4</text>

    <!-- Iterations -->
    <!-- R1 -->
    <rect x="145" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="167.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 1</text>
    <rect x="195" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="217.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 2</text>
    <rect x="245" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="267.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 3</text>
    <!-- R2 -->
    <rect x="300" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="322.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 4</text>
    <rect x="350" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="372.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 5</text>
    <rect x="400" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="422.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 6</text>
    <!-- R3 -->
    <rect x="455" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="477.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 7</text>
    <rect x="505" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="527.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 8</text>
    <rect x="555" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="577.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 9</text>
    <!-- R4 -->
    <rect x="610" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="632.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 10</text>
    <rect x="660" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="682.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 11</text>
    <rect x="710" y="65" width="45" height="35" rx="4" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" /><text x="732.5" y="82.5" dominant-baseline="middle" class="lbl-sm" fill="#fcd34d">It 12</text>
  </g>

  <text x="730" y="382" dominant-baseline="middle" class="lbl-sm" fill="#94a3b8" text-anchor="end">HOÀN THÀNH RELEASE</text>

  <!-- Breakout to Iteration N -->
  <path d="M 370 375 L 260 440" stroke="#475569" stroke-width="1" stroke-dasharray="6,4" fill="none" class="workflow-dashed" />
  <path d="M 425 375 L 530 440" stroke="#475569" stroke-width="1" stroke-dasharray="6,4" fill="none" class="workflow-dashed" />

  <!-- ========= ITERATION N ========= -->
  <rect x="250" y="440" width="290" height="40" rx="8" fill="url(#cardBg)" stroke="rgba(255,255,255,0.05)" stroke-width="1.5" filter="url(#shadow)" />
  <text x="395" y="460" dominant-baseline="middle" class="lbl-bold" fill="#fcd34d" text-anchor="middle" font-size="15px">VÒNG LẶP THỨ N</text>

  <rect x="250" y="490" width="85" height="50" rx="6" fill="#0f172a" stroke="#334155" filter="url(#shadow)" />
  <text x="292.5" y="515" dominant-baseline="middle" class="lbl-sm"><tspan x="292.5" dy="-7">Lập kế hoạch</tspan><tspan x="292.5" dy="14">Vòng lặp</tspan></text>

  <rect x="345" y="490" width="195" height="50" rx="6" fill="#0f172a" stroke="#334155" filter="url(#shadow)" />
  <text x="442.5" y="515" dominant-baseline="middle" class="lbl-sm"><tspan x="442.5" dy="-7">Viết mã &amp; Tích hợp Liên tục</tspan><tspan x="442.5" dy="14">Kiểm thử Đơn vị &amp; Nghiệm thu</tspan></text>

</svg>
