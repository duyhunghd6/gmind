<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 450" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&amp;display=swap');
      
      /* Dark mode (default) */
      .title-rad { fill: #d946ef; }
      .cycle-txt { font-family: 'DM Sans', system-ui, sans-serif; font-size: 13px; font-weight: 700; fill: #cbd5e1; }
      .cycle-bg { fill: rgba(30, 41, 59, 1); stroke: #334155; stroke-width: 2; }
      .arrow-text { font-family: 'DM Sans', system-ui, sans-serif; font-weight: 700; font-size: 14px; }
      .arrow-text-dark { fill: #0f172a; }
      .arrow-text-light { fill: #ffffff; }
      .design-txt { fill: #3b82f6; }
      .user-txt { fill: #ec4899; }
      
      /* Light mode */
      @media (prefers-color-scheme: light) {
        .title-rad { fill: #be185d; }
        .cycle-txt { fill: #334155; }
        .cycle-bg { fill: rgba(255, 255, 255, 1); stroke: #cbd5e1; }
        .design-txt { fill: #2563eb; }
        .user-txt { fill: #db2777; }
      }
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.25" />
    </filter>
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.3" />
    </filter>
    
    <marker id="arr-pink" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 2 L 10 6 L 0 10 z" fill="#d946ef" />
    </marker>
    <marker id="arr-purp" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 2 L 10 6 L 0 10 z" fill="#8b5cf6" />
    </marker>
    <marker id="arr-blue" viewBox="0 0 12 12" refX="9" refY="6" markerWidth="4" markerHeight="4" orient="auto">
      <path d="M 0 2 L 10 6 L 0 10 z" fill="#3b82f6" />
    </marker>
  </defs>

  <!-- Transparent background -->

  <!-- Title -->
  <text x="550" y="80" text-anchor="middle" class="title-rad" font-family="'DM Sans', sans-serif" font-size="28" font-weight="700">Rapid Application Development (RAD)</text>

  <!-- Block Arrows -->
  <g filter="url(#shadow-sm)">
    <!-- Requirements Planning -->
    <path class="arrow-bg-req" d="M 100,205 L 390,205 L 390,165 L 450,240 L 390,315 L 390,275 L 100,275 Q 90,275 90,265 L 90,215 Q 90,205 100,205 Z" fill="#93c5fd" />
    <text x="215" y="245" text-anchor="middle" class="arrow-text arrow-text-dark">Requirements Planning</text>

    <!-- Construction -->
    <path class="arrow-bg-const" d="M 390,205 L 670,205 L 670,165 L 730,240 L 670,315 L 670,275 L 390,275 L 450,240 Z" fill="#3b82f6" />
    <text x="635" y="245" text-anchor="middle" class="arrow-text arrow-text-light">Construction</text>

    <!-- Cutover -->
    <path class="arrow-bg-cut" d="M 670,205 L 950,205 L 950,165 L 1010,240 L 950,315 L 950,275 L 670,275 L 730,240 Z" fill="#1d4ed8" />
    <text x="860" y="245" text-anchor="middle" class="arrow-text arrow-text-light">Cutover</text>
  </g>

  <!-- Circle Overlay Layer -->
  <g filter="url(#shadow-sm)">
    <circle cx="450" cy="240" r="100" class="cycle-bg" />
  </g>

  <!-- Inner User Design Text -->
  <text x="450" y="247" text-anchor="middle" font-family="'DM Sans', sans-serif" font-weight="700" font-size="22">
    <tspan class="user-txt">User </tspan><tspan class="design-txt">Design</tspan>
  </text>

  <!-- Cycle Arrows (R=108, Center=450,240) -->
  <g fill="none" stroke-width="4" stroke-linecap="round">
    <!-- Refine -> Prototype (Pink) -->
    <path d="M 367.2,309.4 A 108 108 0 0 1 404.3,142.1" stroke="#d946ef" marker-end="url(#arr-pink)" />
    
    <!-- Prototype -> Test (Purple) -->
    <path d="M 495.7,142.1 A 108 108 0 0 1 532.8,309.4" stroke="#8b5cf6" marker-end="url(#arr-purp)" />
    
    <!-- Test -> Refine (Blue) -->
    <path d="M 504.0,333.5 A 108 108 0 0 1 396.0,333.5" stroke="#3b82f6" marker-end="url(#arr-blue)" />
  </g>

  <!-- Cycle Labels -->
  <text x="450" y="128" text-anchor="middle" class="cycle-txt">Prototype</text>
  <text x="530" y="335" text-anchor="middle" class="cycle-txt">Test</text>
  <text x="370" y="335" text-anchor="middle" class="cycle-txt">Refine</text>

</svg>
