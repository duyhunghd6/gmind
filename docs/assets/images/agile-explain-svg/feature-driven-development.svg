<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap');
      .title { font-family: 'DM Sans', system-ui, sans-serif; font-size: 14px; font-weight: 500; fill: #f8fafc; text-anchor: middle; letter-spacing: 0.5px; }
      .box-txt { font-family: 'DM Sans', system-ui, sans-serif; font-size: 10px; font-weight: 400; fill: #e2e8f0; text-anchor: middle; }
      .foot-txt { font-family: 'DM Sans', system-ui, sans-serif; font-size: 10px; font-weight: 400; fill: #94a3b8; text-anchor: middle; }
      .box { rx: 6; fill: #1e293b; filter: url(#shadow); }
      /* Theme Adaptation */
      rect[fill="url(#bg)"] { fill: transparent !important; }
      @media (prefers-color-scheme: light) {
        rect[fill="#1e293b" i], rect[fill="#0f172a" i], rect[fill="#131c2f" i], 
        rect[fill="rgba(30, 41, 59, 1)" i], rect[fill="rgba(15, 23, 42, 1)" i],
        .box, .node-rect, .card { 
          fill: #ffffff !important; 
          stroke: #cbd5e1 !important; 
        }
        rect[fill="url(#cardBg)" i], rect[fill="url(#cardBg1)" i], rect[fill="url(#surface)" i], rect[fill="url(#glass)" i] {
          fill: #ffffff !important; 
          stroke: #e2e8f0 !important; 
        }
        
        /* Dark text (previously white/light) */
        text[fill="#ffffff" i], text[fill="#fff" i], text[fill="white" i], 
        text[fill="#f8fafc" i], text[fill="#f1f5f9" i],
        tspan[fill="#ffffff" i], tspan[fill="#fff" i], tspan[fill="white" i], 
        tspan[fill="#f8fafc" i], tspan[fill="#f1f5f9" i],
        g[fill="#ffffff" i] text, g[fill="#fff" i] text, g[fill="white" i] text,
        g[fill="#f8fafc" i] text, g[fill="#f1f5f9" i] text,
        .white-txt, .white-text, .text-white, .text-light,
        .box-txt, .node-txt, .hdr, .title, .phase-text, .lead, .lbl-bold, .title-text, .step-text-large, .num, .section-title, .header-txt, .group-txt, .prac-txt, .bold-txt, text.bold, text.large, text.txt {
          fill: #0f172a !important;
        }

        /* Gray text (previously light gray) */
        text[fill="#cbd5e1" i], text[fill="#94a3b8" i], text[fill="#e2e8f0" i],
        tspan[fill="#cbd5e1" i], tspan[fill="#94a3b8" i],
        .mono-txt, .desc-text, .sub, .sm-txt, .lbl-sm, .text-gray, text.small, text.medium, .step-text-small, .list-txt, .desc, .lbl-txt, .col-txt, .row-txt {
          fill: #475569 !important;
        }

        /* Specific foreignObject HTML content */
        .body { color: #475569 !important; }
        
        /* Vibrant color mappings for light mode contrast */
        text[fill="#2dd4bf" i], .brace-txt { fill: #0d9488 !important; }
        text[fill="#38bdf8" i], .label-text, text[fill="#0ea5e9" i] { fill: #0284c7 !important; }
        text[fill="#fb7185" i], text[fill="#ec4899" i] { fill: #e11d48 !important; }
        text[fill="#fcd34d" i], text[fill="#f59e0b" i] { fill: #d97706 !important; }
        text[fill="#6ee7b7" i], text[fill="#10b981" i] { fill: #059669 !important; }
        text[fill="#93c5fd" i] { fill: #2563eb !important; }
        text[fill="#a855f7" i] { fill: #9333ea !important; }
        
        /* Paths and lines */
        path[stroke="#64748b" i], line[stroke="#64748b" i], path[stroke="#475569" i], line[stroke="#475569" i], path[stroke="#cbd5e1" i], line[stroke="#cbd5e1" i], path[stroke="#ffffff" i], path[stroke="#fff" i] {
          stroke: #94a3b8 !important;
        }
        line[stroke="rgba(255,255,255,0.1)"], line[stroke="rgba(255,255,255,0.2)"], line[stroke="#ffffff" i], line[stroke="#fff" i] {
          stroke: rgba(0,0,0,0.1) !important;
        }
        circle[fill="#ffffff" i], circle[fill="#fff" i] {
          fill: #0f172a !important;
        }
      }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1121" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5" />
    </filter>
      <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(30, 41, 59, 1)" />
      <stop offset="100%" stop-color="rgba(15, 23, 42, 1)" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="300" fill="url(#bg)" rx="12" />

  <!-- Title -->
  <text class="title" x="400" y="25.2" dominant-baseline="middle">Phương pháp Feature Driven Development (FDD)</text>

  <!-- Left Tall Boxes (Grey -> Sky Blue) -->
  <rect class="box" x="35" y="60" width="140" height="150" stroke="#0284c7" stroke-width="0.75" />
  <text class="box-txt" fill="#7dd3fc" x="105" y="121.4" dominant-baseline="middle">Phát triển</text>
  <text class="box-txt" fill="#7dd3fc" x="105" y="141.4" dominant-baseline="middle">Mô hình Tổng thể</text>

  <rect class="box" x="185" y="60" width="140" height="150" stroke="#0ea5e9" stroke-width="0.75" />
  <text class="box-txt" fill="#38bdf8" x="255" y="121.4" dominant-baseline="middle">Xây dựng Danh sách</text>
  <text class="box-txt" fill="#38bdf8" x="255" y="141.4" dominant-baseline="middle">Tính năng</text>

  <!-- Small Boxes (Row 1: Teal) -->
  <rect class="box" x="335" y="60" width="140" height="42" stroke="#0f766e" stroke-width="0.75" />
  <text class="box-txt" fill="#2dd4bf" x="405" y="80.4" dominant-baseline="middle">Lên KH theo Tính năng</text>
  
  <rect class="box" x="485" y="60" width="140" height="42" stroke="#0f766e" stroke-width="0.75" />
  <text class="box-txt" fill="#2dd4bf" x="555" y="80.4" dominant-baseline="middle">Thiết kế theo Tính năng</text>

  <rect class="box" x="635" y="60" width="140" height="42" stroke="#0f766e" stroke-width="0.75" />
  <text class="box-txt" fill="#2dd4bf" x="705" y="80.4" dominant-baseline="middle">Lập trình theo Tính năng</text>

  <!-- Small Boxes (Row 2: Amethyst/Purple) -->
  <rect class="box" x="335" y="114" width="140" height="42" stroke="#6d28d9" stroke-width="0.75" />
  <text class="box-txt" fill="#a78bfa" x="405" y="134.4" dominant-baseline="middle">Lên KH theo Tính năng</text>
  
  <rect class="box" x="485" y="114" width="140" height="42" stroke="#6d28d9" stroke-width="0.75" />
  <text class="box-txt" fill="#a78bfa" x="555" y="134.4" dominant-baseline="middle">Thiết kế theo Tính năng</text>

  <rect class="box" x="635" y="114" width="140" height="42" stroke="#6d28d9" stroke-width="0.75" />
  <text class="box-txt" fill="#a78bfa" x="705" y="134.4" dominant-baseline="middle">Lập trình theo Tính năng</text>

  <!-- Small Boxes (Row 3: Amber) -->
  <rect class="box" x="335" y="168" width="140" height="42" stroke="#b45309" stroke-width="0.75" />
  <text class="box-txt" fill="#fbbf24" x="405" y="188.4" dominant-baseline="middle">Lên KH theo Tính năng</text>
  
  <rect class="box" x="485" y="168" width="140" height="42" stroke="#b45309" stroke-width="0.75" />
  <text class="box-txt" fill="#fbbf24" x="555" y="188.4" dominant-baseline="middle">Thiết kế theo Tính năng</text>

  <rect class="box" x="635" y="168" width="140" height="42" stroke="#b45309" stroke-width="0.75" />
  <text class="box-txt" fill="#fbbf24" x="705" y="188.4" dominant-baseline="middle">Lập trình theo Tính năng</text>

  <!-- Footer Bracket for Left Grouping -->
  <path d="M 35 225 L 35 245 L 325 245 L 325 225" fill="none" stroke="#475569" stroke-width="1" />
  <rect x="90" y="235" width="180" height="20" fill="#0b1121" />
  <text class="foot-txt" x="180" y="244" dominant-baseline="middle">Thiết lập Mô hình Tổng thể</text>

  <!-- Footer Bracket for Right Grouping -->
  <path d="M 335 225 L 335 245 L 775 245 L 775 225" fill="none" stroke="#475569" stroke-width="1" />
  <rect x="460" y="235" width="190" height="20" fill="#0b1121" />
  <text class="foot-txt" x="555" y="244" dominant-baseline="middle">Lặp lại cho từng Tính năng</text>

  <!-- Bottom Timeline connecting lines -->
  <line x1="180" y1="245" x2="180" y2="280" stroke="#475569" stroke-width="1" />
  <line x1="555" y1="245" x2="555" y2="280" stroke="#475569" stroke-width="1" />
  <line x1="35" y1="280" x2="775" y2="280" stroke="#475569" stroke-width="1" />

</svg>
