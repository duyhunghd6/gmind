<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&amp;display=swap');
      .title { fill: #f8fafc; font-size: 28px; font-family: 'DM Sans', system-ui, sans-serif; font-weight: 500; letter-spacing: 1px; }
      .num { fill: #14b8a6; font-size: 40px; font-family: 'DM Sans', system-ui, sans-serif; font-weight: 500; }
      .lead { fill: #f8fafc; font-size: 20px; font-family: 'DM Sans', system-ui, sans-serif; font-weight: 500; }
      .sub { fill: #94a3b8; font-size: 16px; font-family: 'DM Sans', system-ui, sans-serif; font-weight: 400; }
      .body { color: #cbd5e1; font-family: 'DM Sans', system-ui, sans-serif; font-size: 15px; line-height: 1.5; font-weight: 400; }
      /* Theme Adaptation */
      rect[fill="url(#bg)"] { fill: transparent !important; }
      @media (prefers-color-scheme: light) {
        rect[fill="#1e293b" i], rect[fill="#0f172a" i], rect[fill="#131c2f" i], 
        rect[fill="rgba(30, 41, 59, 1)" i], rect[fill="rgba(15, 23, 42, 1)" i],
        .box, .node-rect, .card { 
          fill: #ffffff !important; 
          stroke: #cbd5e1 !important; 
        }
        rect[fill="url(#cardBg)" i], rect[fill="url(#cardBg1)" i], rect[fill="url(#surface)" i], rect[fill="url(#glass)" i] {
          fill: #ffffff !important; 
          stroke: #e2e8f0 !important; 
        }
        
        /* Dark text (previously white/light) */
        text[fill="#ffffff" i], text[fill="#fff" i], text[fill="white" i], 
        text[fill="#f8fafc" i], text[fill="#f1f5f9" i],
        tspan[fill="#ffffff" i], tspan[fill="#fff" i], tspan[fill="white" i], 
        tspan[fill="#f8fafc" i], tspan[fill="#f1f5f9" i],
        g[fill="#ffffff" i] text, g[fill="#fff" i] text, g[fill="white" i] text,
        g[fill="#f8fafc" i] text, g[fill="#f1f5f9" i] text,
        .white-txt, .white-text, .text-white, .text-light,
        .box-txt, .node-txt, .hdr, .title, .phase-text, .lead, .lbl-bold, .title-text, .step-text-large, .num, .section-title, .header-txt, .group-txt, .prac-txt, .bold-txt, text.bold, text.large, text.txt {
          fill: #0f172a !important;
        }

        /* Gray text (previously light gray) */
        text[fill="#cbd5e1" i], text[fill="#94a3b8" i], text[fill="#e2e8f0" i],
        tspan[fill="#cbd5e1" i], tspan[fill="#94a3b8" i],
        .mono-txt, .desc-text, .sub, .sm-txt, .lbl-sm, .text-gray, text.small, text.medium, .step-text-small, .list-txt, .desc, .lbl-txt, .col-txt, .row-txt {
          fill: #475569 !important;
        }

        /* Specific foreignObject HTML content */
        .body { color: #475569 !important; }
        
        /* Vibrant color mappings for light mode contrast */
        text[fill="#2dd4bf" i], .brace-txt { fill: #0d9488 !important; }
        text[fill="#38bdf8" i], .label-text, text[fill="#0ea5e9" i] { fill: #0284c7 !important; }
        text[fill="#fb7185" i], text[fill="#ec4899" i] { fill: #e11d48 !important; }
        text[fill="#fcd34d" i], text[fill="#f59e0b" i] { fill: #d97706 !important; }
        text[fill="#6ee7b7" i], text[fill="#10b981" i] { fill: #059669 !important; }
        text[fill="#93c5fd" i] { fill: #2563eb !important; }
        text[fill="#a855f7" i] { fill: #9333ea !important; }
        
        /* Paths and lines */
        path[stroke="#64748b" i], line[stroke="#64748b" i], path[stroke="#475569" i], line[stroke="#475569" i], path[stroke="#cbd5e1" i], line[stroke="#cbd5e1" i], path[stroke="#ffffff" i], path[stroke="#fff" i] {
          stroke: #94a3b8 !important;
        }
        line[stroke="rgba(255,255,255,0.1)"], line[stroke="rgba(255,255,255,0.2)"], line[stroke="#ffffff" i], line[stroke="#fff" i] {
          stroke: rgba(0,0,0,0.1) !important;
        }
        circle[fill="#ffffff" i], circle[fill="#fff" i] {
          fill: #0f172a !important;
        }
      }
    </style>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0b1121" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(30, 41, 59, 1)" />
      <stop offset="100%" stop-color="rgba(15, 23, 42, 1)" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#000" flood-opacity="0.6" />
    </filter>
  </defs>

  <rect width="100%" height="100%" fill="url(#bg)" rx="16" />
  
  <text x="500" y="50.2" dominant-baseline="middle" text-anchor="middle" class="title">4 GIÁ TRỊ CỐT LÕI CỦA AGILE</text>

  <!-- Values Boxes -->
  <g>
    <!-- Value 1 -->
    <rect x="100" y="120" width="380" height="250" rx="12" fill="rgba(14, 165, 233, 0.05)" stroke="#0ea5e9" stroke-width="1.5" filter="url(#shadow)" />
    <text x="130" y="154" dominant-baseline="middle" class="num" fill="#0ea5e9">1</text>
    <text x="180" y="149" dominant-baseline="middle" class="lead">Cá nhân và tương tác</text>
    <text x="180" y="174" dominant-baseline="middle" class="sub">hơn là quy trình và công cụ</text>
    
    <foreignObject x="130" y="210" width="320" height="130">
      <div xmlns="http://www.w3.org/1999/xhtml" class="body">
        Đề cao sức mạnh của nhóm, mức độ làm việc và phối hợp hiệu quả quan trọng hơn là các công cụ hay quy trình được sử dụng. Thành công thực sự của một dự án đến từ tinh thần làm việc nhóm tốt, giao tiếp cởi mở và sự hợp tác.
      </div>
    </foreignObject>

    <!-- Value 2 -->
    <rect x="520" y="120" width="380" height="250" rx="12" fill="rgba(16, 185, 129, 0.05)" stroke="#10b981" stroke-width="1.5" filter="url(#shadow)" />
    <text x="550" y="154" dominant-baseline="middle" class="num" fill="#10b981">2</text>
    <text x="600" y="149" dominant-baseline="middle" class="lead">Phần mềm Hoạt động Tốt</text>
    <text x="600" y="174" dominant-baseline="middle" class="sub">hơn là tài liệu đầy đủ</text>
    
    <foreignObject x="550" y="210" width="320" height="130">
      <div xmlns="http://www.w3.org/1999/xhtml" class="body">
        Agile ưu tiên việc phân phối phần mềm có thể hoạt động nhanh chóng thay vì sa đà vào các tài liệu dài dòng. Trọng tâm là đưa một sản phẩm hoạt động được vào tay người dùng và cải tiến nó dựa trên phản hồi nhận được.
      </div>
    </foreignObject>

    <!-- Value 3 -->
    <rect x="100" y="400" width="380" height="250" rx="12" fill="rgba(245, 158, 11, 0.05)" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)" />
    <text x="130" y="434" dominant-baseline="middle" class="num" fill="#f59e0b">3</text>
    <text x="180" y="429" dominant-baseline="middle" class="lead">Cộng tác với Khách hàng</text>
    <text x="180" y="454" dominant-baseline="middle" class="sub">hơn là đàm phán hợp đồng</text>
    
    <foreignObject x="130" y="490" width="320" height="130">
      <div xmlns="http://www.w3.org/1999/xhtml" class="body">
        Agile coi trọng việc cộng tác thường xuyên với khách hàng hơn là tuân thủ nghiêm ngặt hợp đồng. Tập trung vào việc để khách hàng tham gia xuyên suốt quá trình lập trình, đảm bảo sản phẩm ứng với nhu cầu và điều chỉnh theo phản hồi.
      </div>
    </foreignObject>

    <!-- Value 4 -->
    <rect x="520" y="400" width="380" height="250" rx="12" fill="rgba(236, 72, 153, 0.05)" stroke="#ec4899" stroke-width="1.5" filter="url(#shadow)" />
    <text x="550" y="434" dominant-baseline="middle" class="num" fill="#ec4899">4</text>
    <text x="600" y="429" dominant-baseline="middle" class="lead">Phản hồi Thay đổi</text>
    <text x="600" y="454" dominant-baseline="middle" class="sub">hơn là bám sát kế hoạch</text>
    
    <foreignObject x="550" y="490" width="320" height="130">
      <div xmlns="http://www.w3.org/1999/xhtml" class="body">
        Trong Agile, thay đổi là điều luôn dự kiến trước, khuyến khích sự linh hoạt. Thay vì bám cứng vào một kế hoạch không còn phù hợp, các nhóm Agile thích nghi và điều chỉnh dựa trên thông tin mới hoặc điều kiện dự án thay đổi.
      </div>
    </foreignObject>
  </g>
</svg>
